<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>合同详情</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 详情页特有样式 */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .detail-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    
    .contract-info {
      background-color: #fff;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .contract-info-item {
      display: flex;
      margin-bottom: 12px;
      font-size: 14px;
    }
    
    .contract-info-item:last-child {
      margin-bottom: 0;
    }
    
    .contract-info-label {
      width: 100px;
      color: #666;
      flex-shrink: 0;
    }
    
    .contract-info-value {
      flex: 1;
      color: #333;
      word-break: break-all;
    }
    
    .contract-content {
      background-color: #fff;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .content-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
      color: #333;
    }
    
    .content-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background-color: #f5f5f5;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .content-link:hover {
      background-color: #e8e8e8;
    }
    
    .content-link-icon {
      font-size: 18px;
    }
    
    .content-link-text {
      flex: 1;
      font-size: 14px;
      color: #007aff;
    }
    
    .content-link-arrow {
      font-size: 14px;
      color: #999;
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="nav-bar">
    <div class="nav-left">
      <button class="back-btn" onclick="goBack()">&lt;</button>
    </div>
    <div class="nav-title">合同详情</div>
    <div class="nav-right">
      <button class="more-btn">•••</button>
      <button class="minimize-btn">—</button>
      <button class="close-btn">⊗</button>
    </div>
  </header>

  <!-- 内容区域 -->
  <div class="content">
    <!-- 合同基本信息 -->
    <div class="contract-info">
      <div class="detail-header">
        <span class="icon">📄</span>
        <h2 class="detail-title">合同信息</h2>
      </div>
      
      <div class="contract-info-item">
        <div class="contract-info-label">合同名称：</div>
        <div class="contract-info-value">2024年3季度红冲协议0822</div>
      </div>
      <div class="contract-info-item">
        <div class="contract-info-label">合同类型：</div>
        <div class="contract-info-value">其他协议</div>
      </div>
      <div class="contract-info-item">
        <div class="contract-info-label">合同编号：</div>
        <div class="contract-info-value">CT20250018</div>
      </div>
    </div>

    <!-- 合同内容 -->
    <div class="contract-content">
      <h3 class="content-title">合同内容</h3>
      <div class="content-link" onclick="viewContract()">
        <span class="content-link-icon">📑</span>
        <span class="content-link-text">合同内容.pdf</span>
        <span class="content-link-arrow">→</span>
      </div>
    </div>
  </div>

  <!-- 底部操作按钮 -->
  <div class="batch-approve-container">
    <div style="display: flex; gap: 12px;">
      <button class="action-btn reject-btn" style="flex: 1;" onclick="reject()">驳回</button>
      <button class="action-btn approve-btn" style="flex: 1;" onclick="approve()">通过</button>
    </div>
  </div>

  <script>
    // 返回上一页
    function goBack() {
      window.history.back();
    }

    // 查看合同内容
    function viewContract() {
      // 跳转到合同内容页面
      window.open('contract.html', '_blank');
    }

    // 驳回审批
    function reject() {
      showToast('审批驳回');
      // 这里可以调用API处理审批驳回逻辑
    }

    // 通过审批
    function approve() {
      showToast('审批通过');
      // 这里可以调用API处理审批通过逻辑
    }

    // 显示提示消息
    function showToast(message) {
      // 创建提示元素
      let toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      // 显示提示
      setTimeout(() => {
        toast.classList.add('show');
      }, 100);
      
      // 3秒后隐藏
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => {
          document.body.removeChild(toast);
        }, 300);
      }, 3000);
    }
  </script>
</body>
</html>
